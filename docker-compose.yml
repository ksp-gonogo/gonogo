services:
  telnet-proxy:
    build:
      # Repo-root context so pnpm can resolve workspace deps (@gonogo/logger).
      context: .
      dockerfile: packages/telnet-proxy/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      # KOS_HOST: IP or hostname of the machine running KSP.
      # host.containers.internal reaches the host from inside a Podman container.
      KOS_HOST: ${KOS_HOST:-host.containers.internal}
      KOS_PORT: ${KOS_PORT:-5410}
      # Axiom log shipping. Empty default → no transport installed.
      AXIOM_TOKEN: ${AXIOM_TOKEN:-}
      AXIOM_DATASET: ${AXIOM_DATASET:-gonogo}
    restart: unless-stopped

  # The relay bundles three responsibilities: OCISLY camera bridging, the
  # `/ice-config` endpoint (read by the main screen on boot), and the
  # coturn TURN/STUN server (spawned as a child process). Bundling means
  # one container with one rotated-per-restart secret, no init scripts,
  # no shared volumes — just `podman compose up` and you have a working
  # relay. See packages/relay/src/coturnManager.ts.
  relay:
    build:
      # Repo-root context so pnpm can resolve workspace deps (@gonogo/logger).
      context: .
      dockerfile: packages/relay/Dockerfile
    ports:
      - "3002:3002"
      # TURN signalling. Both UDP and TCP for client compatibility.
      - "3478:3478/udp"
      - "3478:3478/tcp"
      # TURN relay port range. Every active relay session takes one port
      # in this window, so the whole range must be mappable to the host.
      # Matches min-port / max-port in coturnManager.ts.
      - "49160-49200:49160-49200/udp"
    environment:
      PORT: 3002
      # OCISLY_HOST: IP or hostname of the machine running the OCISLY server.
      # Default reaches the compose host (for users running the server on the
      # game box). With `--profile ocisly-local`, override to `ocisly-server`
      # so the proxy reaches the sidecar via the compose network.
      OCISLY_HOST: ${OCISLY_HOST:-host.containers.internal}
      OCISLY_PORT: ${OCISLY_PORT:-5077}
      # Optional pin for the public IP coturn advertises to clients.
      # When unset (the typical case) the relay auto-discovers it via a
      # public lookup at startup.
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP:-}
      # Axiom log shipping. Empty default → no transport installed
      # (matches the browser pattern). Set in `.env` next to this file
      # to opt in.
      AXIOM_TOKEN: ${AXIOM_TOKEN:-}
      AXIOM_DATASET: ${AXIOM_DATASET:-gonogo}
    depends_on:
      # Only enforced when the ocisly-local profile is active; compose skips
      # the dependency silently if ocisly-server isn't being started.
      ocisly-server:
        condition: service_healthy
        required: false
    restart: unless-stopped

  # Optional: run the OCISLY gRPC server next to the relay instead of on the
  # game machine. Enable with `podman compose --profile ocisly-local up`.
  # Note: published image is linux/amd64 only — Apple Silicon will run it
  # under qemu emulation.
  ocisly-server:
    image: jrodrigv/ofcourseistillloveyou:latest
    platform: linux/amd64
    ports:
      - "5077:5077"
    command: [ "--port", "5077", "--endpoint", "0.0.0.0" ]
    # Base image (dotnet:6.0 runtime) lacks curl / nc, so we use bash's
    # built-in /dev/tcp to check the gRPC port is accepting connections.
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/localhost/5077" ]
      interval: 3s
      timeout: 2s
      retries: 40
      # Apple Silicon runs this image under qemu emulation (linux/amd64
      # only), where dotnet boot regularly takes ~80s. start_period
      # holds health checks below failure-counting until then.
      start_period: 90s
    restart: unless-stopped

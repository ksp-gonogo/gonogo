services:
  # The relay bundles the `/ice-config` endpoint (read by the main screen on
  # boot) and the coturn TURN/STUN server (spawned as a child process).
  # Bundling means one container with one rotated-per-restart secret, no init
  # scripts, no shared volumes — just `podman compose up` and you have a
  # working relay. See packages/relay/src/coturnManager.ts.
  relay:
    build:
      # Repo-root context so pnpm can resolve workspace deps (@ksp-gonogo/logger).
      context: .
      dockerfile: packages/relay/Dockerfile
    ports:
      - "3002:3002"
      # TURN signalling. Both UDP and TCP for client compatibility.
      - "3478:3478/udp"
      - "3478:3478/tcp"
      # TURN relay port range. Every active relay session takes one port
      # in this window, so the whole range must be mappable to the host.
      # Matches min-port / max-port in coturnManager.ts. Sized at 11
      # ports — covers ≤10 simultaneous TURN-relayed clients, and
      # consumer routers (Google Wi-Fi etc.) require one port-forward
      # entry per port, so a small range keeps the click cost down.
      - "49160-49170:49160-49170/udp"
    environment:
      PORT: 3002
      # Optional pin for the public IP coturn advertises to clients.
      # When unset (the typical case) the relay auto-discovers it via a
      # public lookup at startup.
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP:-}
      # Axiom log shipping. Empty default → no transport installed
      # (matches the browser pattern). Set in `.env` next to this file
      # to opt in.
      AXIOM_TOKEN: ${AXIOM_TOKEN:-}
      AXIOM_DATASET: ${AXIOM_DATASET:-gonogo}
    restart: unless-stopped

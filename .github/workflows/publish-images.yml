name: Publish proxy images

# Two publish channels share these jobs:
#
#   dev      every CI-green push to main (workflow_run). Images are tagged
#            `dev` + `sha-…` and the bundle's app build carries a
#            `-dev.<shortsha>` version suffix. Testers run `:dev`; end users
#            never see it.
#   release  dispatched by release.yml on a `v*` tag, with channel=release.
#            Images are tagged `<version>` (from packages/app/package.json,
#            which the release commit just bumped) + `latest`. The version
#            also rides the peer `hello` handshake, so a station can tell
#            which release a host is running and the matching image tag lets
#            an operator pull (or pin) exactly that.
#
# Tag-driven `type=semver` can't work here: GITHUB_TOKEN-pushed tags never
# fire push triggers, so this workflow only ever sees workflow_run/dispatch
# events. The version is read from package.json instead.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      channel:
        description: "Publish channel"
        required: false
        default: dev
        type: choice
        options:
          - dev
          - release

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ inputs.channel || 'dev' }}
  cancel-in-progress: false

env:
  # workflow_run events have no inputs — they're always the dev channel.
  CHANNEL: ${{ inputs.channel || 'dev' }}

jobs:
  publish:
    # Only publish when CI passed. workflow_dispatch skips the check.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: telnet-proxy
            image: gonogo-telnet-proxy
          - package: relay
            image: gonogo-relay
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: appver
        run: |
          echo "version=$(node -p "require('./packages/app/package.json').version")" >> "$GITHUB_OUTPUT"

      - id: suffix
        run: |
          if [ "$CHANNEL" = "dev" ]; then
            SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
            echo "value=-dev.${SHA:0:7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - id: build-time
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=dev,enable=${{ env.CHANNEL == 'dev' }}
            type=raw,value=${{ steps.appver.outputs.version }},enable=${{ env.CHANNEL == 'release' }}
            type=raw,value=latest,enable=${{ env.CHANNEL == 'release' }}

      - uses: docker/build-push-action@v6
        with:
          # Repo-root context so pnpm can resolve workspace deps inside
          # the build (services depend on @gonogo/logger).
          context: .
          file: ./packages/${{ matrix.package }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Runtime ENV for the services' log identity.
          build-args: |
            GONOGO_VERSION=${{ steps.appver.outputs.version }}${{ steps.suffix.outputs.value }}
            GONOGO_BUILD_TIME=${{ steps.build-time.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.package }}
          cache-to: type=gha,mode=max,scope=${{ matrix.package }}

  # End-user bundle: app + relay + telnet-proxy in one image, served from
  # Dockerfile.bundle (repo-root context). Separate job from the matrix
  # because it needs a GITHUB_TOKEN build-arg (the app pulls @jonpepler/
  # kerbcast from GitHub Packages) and a different Dockerfile shape.
  publish-bundle:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: appver
        run: |
          echo "version=$(node -p "require('./packages/app/package.json').version")" >> "$GITHUB_OUTPUT"

      # Dev bundles bake a prerelease suffix into the app so a host running
      # `:dev` announces e.g. 0.1.0-dev.a1b2c3d in the hello handshake.
      - id: suffix
        run: |
          if [ "$CHANNEL" = "dev" ]; then
            SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
            echo "value=-dev.${SHA:0:7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - id: build-time
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gonogo
          tags: |
            type=sha,prefix=sha-
            type=raw,value=dev,enable=${{ env.CHANNEL == 'dev' }}
            type=raw,value=${{ steps.appver.outputs.version }},enable=${{ env.CHANNEL == 'release' }}
            type=raw,value=latest,enable=${{ env.CHANNEL == 'release' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.bundle
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # The app build authenticates to GitHub Packages for
          # @jonpepler/kerbcast. The auto-injected GITHUB_TOKEN has
          # read:packages, same as the Pages deploy workflow's install step.
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
            VITE_AXIOM_TOKEN=${{ secrets.VITE_AXIOM_TOKEN }}
            GONOGO_VERSION_SUFFIX=${{ steps.suffix.outputs.value }}
            GONOGO_VERSION=${{ steps.appver.outputs.version }}${{ steps.suffix.outputs.value }}
            GONOGO_BUILD_TIME=${{ steps.build-time.outputs.value }}
          cache-from: type=gha,scope=gonogo-bundle
          cache-to: type=gha,mode=max,scope=gonogo-bundle

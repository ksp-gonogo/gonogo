name: Build and publish one Uplink mod

# Reusable workflow_call: builds a single mod's GameData zip and, on the
# release channel, publishes it straight to SpaceDock. One job — build and
# SpaceDock share the freshly-built zip, no artifact round-trip needed.
#
# This is the shared per-mod pipeline behind publish-mods.yml's matrix
# (first-party monorepo). It's written so a future third-party Uplink repo
# (P7 marketplace) can call it too: `uses: ksp-gonogo/gonogo/.github/workflows/_build-uplink-mod.yml@main`
# with its own csproj/dll/gamedata inputs and `secrets: inherit` (or its own
# KSP_MANAGED_TOKEN / SPACEDOCK_* secrets) — no changes needed here.
#
# version/ref/channel are computed by the CALLER, not derived here, so this
# workflow stays a pure "build+publish what I'm told" step — see
# docs/superpowers/plans/2026-07-11-mod-release-pipeline-design.md §4c.

on:
  workflow_call:
    inputs:
      id:
        description: "Mod id — used for artifact name, zip filename, log messages"
        required: true
        type: string
      csproj:
        description: "Path to the mod's .csproj"
        required: true
        type: string
      dll:
        description: "Built DLL filename to bundle"
        required: true
        type: string
      gamedata:
        description: "GameData/<gamedata>/ folder name"
        required: true
        type: string
      extra_dlls:
        description: "Space-separated extra DLLs to bundle alongside dll"
        required: false
        type: string
        default: ""
      notice:
        description: "Path to a NOTICE file to bundle, if any"
        required: false
        type: string
        default: ""
      channel:
        description: "dev or release"
        required: true
        type: string
      ref:
        description: "gonogo commit/tag to checkout and build"
        required: true
        type: string
      version:
        description: "Version string to stamp into build-info.txt and use for the zip/SpaceDock upload"
        required: true
        type: string
      spacedock_mod_id:
        description: "Resolved SpaceDock listing id (release channel only)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          # fetch-depth 20 (not the default shallow 1) so the SpaceDock
          # changelog step below has real history to summarize on the
          # release channel — matches the old publish-spacedock job's
          # checkout.
          fetch-depth: 20

      # ksp-managed is a private repo of non-redistributable KSP/Unity
      # (and here, third-party mod) reference assemblies — see the
      # OUTSTANDING PREREQS block at the top of publish-mods.yml. Token
      # carries its own cross-repo Contents:read, hence `permissions:
      # contents: read` at the workflow level rather than anything broader.
      - name: Checkout KSP assemblies
        uses: actions/checkout@v5
        with:
          repository: ksp-gonogo/ksp-managed
          token: ${{ secrets.KSP_MANAGED_TOKEN }}
          path: ksp-managed

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build ${{ inputs.dll }}
        run: |
          dotnet build "${{ inputs.csproj }}" -c Release \
            /p:KspManaged="${{ github.workspace }}/ksp-managed/KSP_Data/Managed" \
            /p:KspGameData="${{ github.workspace }}/ksp-managed/GameData"

      # Per-mod GameData/<folder>/Plugins/ tree — see
      # docs/superpowers/plans/2026-07-11-mod-release-pipeline-design.md §2.
      # `AppendTargetFrameworkToOutputPath=false` on every KSP-facing
      # csproj means the built DLL always lands directly in bin/Release/,
      # no TFM subfolder to account for.
      - name: Assemble GameData/${{ inputs.gamedata }}
        run: |
          set -euo pipefail
          csproj_dir="$(dirname "${{ inputs.csproj }}")"
          out_dir="${csproj_dir}/bin/Release"
          plugins_dir="GameData/${{ inputs.gamedata }}/Plugins"
          mkdir -p "$plugins_dir"

          if [ ! -f "$out_dir/${{ inputs.dll }}" ]; then
            echo "::error::${{ inputs.dll }} not produced at $out_dir"
            exit 1
          fi
          cp "$out_dir/${{ inputs.dll }}" "$plugins_dir/"

          for extra in ${{ inputs.extra_dlls }}; do
            if [ ! -f "$out_dir/$extra" ]; then
              echo "::error::expected bundled dependency $extra not found at $out_dir"
              exit 1
            fi
            cp "$out_dir/$extra" "$plugins_dir/"
          done

          # Licensing gap fix (design doc §6): ship each Uplink's
          # attribution notice inside the zip. Core has no third-party
          # notice to bundle.
          if [ -n "${{ inputs.notice }}" ]; then
            cp "${{ inputs.notice }}" "$plugins_dir/"
          fi

          {
            echo "version=${{ inputs.version }}"
            echo "git_sha=${GITHUB_SHA}"
            echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "$plugins_dir/build-info.txt"

          echo "GameData/${{ inputs.gamedata }} tree:"
          find "GameData/${{ inputs.gamedata }}" -type f | sort

      - name: Zip GameData/${{ inputs.gamedata }}
        run: |
          ZIP_NAME="${{ inputs.id }}-${{ inputs.version }}.zip"
          zip -r "$ZIP_NAME" "GameData/${{ inputs.gamedata }}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.id }}-zip
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error

      # Mirrors kerbcam release.yml's "Publish to SpaceDock" step: cookie-based
      # login (SpaceDock has no API tokens), multipart upload to
      # /api/mod/<id>/update. Per-mod listing id is passed in as
      # spacedock_mod_id — see OUTSTANDING PREREQS §2 in publish-mods.yml.
      # No KSP-AVC `.version` manifest exists for any gonogo mod yet (design
      # doc §2/§6 gap), so game-version is a hardcoded placeholder pending
      # that follow-up. Uses the zip just built above — no artifact download.
      - name: Publish ${{ inputs.id }} to SpaceDock
        if: ${{ inputs.channel == 'release' }}
        env:
          SPACEDOCK_USERNAME: ${{ secrets.SPACEDOCK_USERNAME }}
          SPACEDOCK_PASSWORD: ${{ secrets.SPACEDOCK_PASSWORD }}
          SPACEDOCK_MOD_ID: ${{ inputs.spacedock_mod_id }}
        run: |
          set -euo pipefail
          if [ -z "${SPACEDOCK_USERNAME:-}" ] || [ -z "${SPACEDOCK_PASSWORD:-}" ] || [ -z "${SPACEDOCK_MOD_ID:-}" ]; then
            echo "::warning::SpaceDock not configured for ${{ inputs.id }} (need secrets SPACEDOCK_USERNAME, SPACEDOCK_PASSWORD and a spacedock_mod_id input); skipping upload"
            exit 0
          fi

          ZIP="${{ env.ZIP_NAME }}"
          VERSION="${{ inputs.version }}"
          # Placeholder until a Gonogo.version / KSP-AVC manifest exists
          # (design doc §2 gap) — the mod targets KSP 1.12.3 per
          # docs/superpowers/plans/2026-07-06-m5b-first-run.md.
          GAME_VERSION="1.12.3"
          git log --oneline -20 > sd-changelog.md

          login="$(curl -sS -F username="$SPACEDOCK_USERNAME" -F password="$SPACEDOCK_PASSWORD" -c ./sd-cookies https://spacedock.info/api/login)"
          if printf '%s' "$login" | grep -q '"error"[[:space:]]*:[[:space:]]*true'; then
            echo "::error::SpaceDock login failed: $login"; exit 1
          fi
          resp="$(curl -sS -b ./sd-cookies \
            -F version="$VERSION" \
            -F "changelog=<sd-changelog.md" \
            -F game-version="$GAME_VERSION" \
            -F notify-followers=yes \
            -F zipball=@"$ZIP" \
            "https://spacedock.info/api/mod/${SPACEDOCK_MOD_ID}/update")"
          if printf '%s' "$resp" | grep -q '"error"[[:space:]]*:[[:space:]]*true'; then
            echo "::error::SpaceDock upload failed: $resp"; exit 1
          fi
          rm -f ./sd-cookies sd-changelog.md
          echo "SpaceDock mod ${SPACEDOCK_MOD_ID} (${{ inputs.id }}) updated to ${VERSION} (KSP ${GAME_VERSION})"

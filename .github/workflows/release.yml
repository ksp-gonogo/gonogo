name: release

# Publishes a release from a v* tag (normally dispatched by
# prepare-release.yml — GITHUB_TOKEN tag pushes don't fire push triggers,
# so the tag-push trigger below only matters for manually pushed tags).
#
# A release is the deliberate act that moves what users see; pushes to
# main only ever move the dev channel (/gonogo/dev/ + `:dev` images).
# This workflow:
#
#   1. runs the full test suite at the tag (the release commit was pushed
#      with GITHUB_TOKEN, so the CI workflow never ran on it — the gate
#      lives here),
#   2. builds the production site and uploads it as the GitHub Release
#      asset `gonogo-site.tar.gz` (deploy.yml composes the Pages root
#      from the newest release's asset),
#   3. dispatches publish-images.yml with channel=release so all three
#      GHCR images get `<version>` + `latest` tags,
#   4. dispatches deploy.yml so the Pages root flips to this release
#      immediately instead of on the next push to main.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write
  # @jonpepler/kerbcast comes from GitHub Packages; pnpm install needs
  # read:packages even though the package is public.
  packages: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify the ref is a release tag matching package.json
        id: version
        run: |
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "::error::release.yml must run on a v* tag ref (got $GITHUB_REF). Cut releases via prepare-release.yml."
            exit 1
          fi
          VERSION="$(node -p "require('./packages/app/package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$TAG" != "v${VERSION}" ]; then
            echo "::error::tag ${TAG} does not match packages/app/package.json version ${VERSION}. Cut releases via prepare-release.yml so the two move together."
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: pnpm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build production site
        run: pnpm turbo build --filter=@ksp-gonogo/app...
        env:
          VITE_BASE_PATH: /gonogo/
          VITE_AXIOM_TOKEN: ${{ secrets.VITE_AXIOM_TOKEN }}

      - name: Pack site asset
        run: tar -czf gonogo-site.tar.gz -C packages/app/dist .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            gonogo-site.tar.gz \
            --repo "${{ github.repository }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

      - name: Publish release images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish-images.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ steps.version.outputs.tag }}" \
            -f channel=release

      - name: Redeploy Pages with the new release at the root
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml \
            --repo "${{ github.repository }}" \
            --ref main

name: Release

# Manual-only. From the Actions UI choose "Run workflow" and pick a tag
# (e.g. v0.1.0) in the ref dropdown. The workflow:
#   - validates the ref is a `v*` tag
#   - rebuilds proxy images at that tag and pushes `:vX.Y.Z` and `:latest`
#
# The Pages publish for the SPA is handled by deploy.yml on every main
# commit (the index.html now carries `gonogo-version` + `gonogo-build-time`
# meta tags so operators can confirm what's live without dev-tools).
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      tag: ${{ steps.parse.outputs.tag }}
    steps:
      - id: parse
        run: |
          ref="${GITHUB_REF_NAME}"
          if [[ "$GITHUB_REF" != refs/tags/* ]]; then
            echo "::error::release.yml must be dispatched on a tag ref (got $GITHUB_REF)"
            exit 1
          fi
          if [[ ! "$ref" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::tag $ref is not a vM.m.p semver tag"
            exit 1
          fi
          echo "tag=$ref" >> "$GITHUB_OUTPUT"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

  publish-images:
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: telnet-proxy
            image: gonogo-telnet-proxy
          - package: ocisly-proxy
            image: gonogo-ocisly-proxy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build-time
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ./packages/${{ matrix.package }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ needs.resolve.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          build-args: |
            GONOGO_VERSION=${{ needs.resolve.outputs.version }}
            GONOGO_BUILD_TIME=${{ steps.build-time.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.package }}
          cache-to: type=gha,mode=max,scope=${{ matrix.package }}

name: Update visual baselines

# Regenerate the per-engine visual baselines on the CI runner (Linux) and
# commit them back to the triggering branch. Baselines MUST be produced in the
# same OS the gate runs in — font rasterisation differs across OSes — so this
# is the only supported way to (re)generate them. Run it whenever a widget
# legitimately changes its appearance:
#
#   gh workflow run update-baselines.yml --ref <branch>            # all widgets
#   gh workflow run update-baselines.yml --ref <branch> -f widget=thermal-status
#
# The visual gate in ci.yml prints this exact command when it detects drift.

on:
  workflow_dispatch:
    inputs:
      widget:
        description: 'Widget id to scope the regen to (blank = all widgets)'
        required: false
        type: string

# contents: write so the job can commit the regenerated baselines back.
# packages: read so pnpm install can pull @jonpepler/kerbcast.
permissions:
  contents: write
  packages: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: pnpm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Build render dependencies
        run: pnpm --filter "@ksp-gonogo/components..." build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Regenerate baselines
        env:
          WIDGET: ${{ inputs.widget }}
        run: |
          for engine in chromium firefox webkit; do
            echo "── updating $engine baselines ──"
            if [ -n "$WIDGET" ]; then
              pnpm --filter @ksp-gonogo/components visual-gate --engine "$engine" --update --widget "$WIDGET"
            else
              pnpm --filter @ksp-gonogo/components visual-gate --engine "$engine" --update
            fi
          done

      - name: Commit and push baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/components/visual-baselines
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
          else
            # --no-verify: this commit only carries regenerated PNG baselines.
            # The local pre-commit (biome/typecheck) and pre-push (full pnpm
            # test) hooks are redundant here — CI re-runs the whole suite on the
            # resulting commit — and the pre-push test run was flaky enough to
            # block the baseline push outright. Skip the hooks; let CI gate.
            git commit --no-verify -m "chore: update visual baselines (${WIDGET:-all widgets})"
            git push --no-verify origin HEAD:${{ github.ref_name }}
          fi
        env:
          WIDGET: ${{ inputs.widget }}

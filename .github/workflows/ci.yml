name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  # `read:packages` is required so pnpm install can pull
  # @jonpepler/kerbcam from GitHub Packages. The other defaults
  # (contents: read) stay implicit.
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: pnpm install
        env:
          # .npmrc references ${GITHUB_TOKEN} for the @jonpepler scope
          # registry on GitHub Packages.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      - run: pnpm lint
      # `pnpm test` runs turbo `test` (dependsOn ^build), so all workspace
      # dists exist afterwards — the Playwright webServers (relay via tsx →
      # @gonogo/logger/dist, app via vite) rely on that.
      - run: pnpm test

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright e2e
        run: pnpm exec playwright test

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

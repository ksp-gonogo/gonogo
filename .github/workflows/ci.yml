name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  # `read:packages` is required so pnpm install can pull
  # @jonpepler/kerbcast from GitHub Packages. The other defaults
  # (contents: read) stay implicit.
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: pnpm install
        env:
          # .npmrc references ${GITHUB_TOKEN} for the @jonpepler scope
          # registry on GitHub Packages.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm test

  # C# Sitrep mod: unit/integration tests + the contract shape-gate.
  # Runs in parallel with `test`/`e2e`/`visual`, on the same triggers.
  #
  # SCOPING — only the KSP-INDEPENDENT projects are built/tested here.
  # Gonogo.KSP, Gonogo.Kos, and GonogoScansatUplink reference KSP/Unity/
  # SCANsat/kOS assemblies via HintPaths into a gitignored local KSP install
  # (local_docs/…/references/*.dll, local_docs/reference/{kos,scansat}), so
  # they are NOT present on the CI runner and `dotnet build mod/Gonogo.sln`
  # wholesale would fail on missing Assembly-CSharp etc. We therefore list the
  # KSP-free projects explicitly rather than build the solution.
  # FOLLOW-UP: to gate the KSP-facing projects in CI we need vendored KSP/
  # SCANsat/kOS reference assemblies (a curated ref-DLL set committed or
  # fetched at CI time) — tracked separately.
  #
  # dotnet test takes a single project, so we iterate the test-project list.
  # The shape-gate (ContractShapeGateTests) lives in Sitrep.Host.Tests and is
  # CI-safe: it reads PE metadata, no Reinforced.Typings runtime dependency.
  mod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: dotnet test (KSP-independent Sitrep projects)
        working-directory: mod
        run: |
          set -euo pipefail
          projects=(
            Sitrep.Core.Tests
            Sitrep.Transport.Tests
            Sitrep.Propagation.Tests
            Sitrep.Skeleton.Tests
            Sitrep.Host.Tests
            Sitrep.Host.IntegrationTests
          )
          for p in "${projects[@]}"; do
            echo "::group::dotnet test $p"
            dotnet test "$p/$p.csproj" --configuration Release
            echo "::endgroup::"
          done

  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: pnpm install
        env:
          # .npmrc references ${GITHUB_TOKEN} for the @jonpepler scope
          # registry on GitHub Packages.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      # turbo build so the Playwright webServers (relay via tsx, app via
      # vite) have all workspace dists. Cache is local-only, so each matrix
      # job builds independently — costs CPU, not wall-time (jobs run in
      # parallel).
      - name: Build workspace
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}

      - name: Playwright e2e (${{ matrix.browser }})
        run: pnpm exec playwright test --project=${{ matrix.browser }}

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

  # Per-engine visual regression gate. Renders every widget through the probe
  # harness for one engine and diffs each against its committed baseline under
  # packages/components/visual-baselines/<engine>/. Its own matrix job with no
  # `needs`, so all three legs run concurrently with `test` and `e2e` — wall
  # time stays ≈ one engine's run. Baselines are Linux-generated (see the
  # update-baselines workflow); on drift the baseline/actual/diff PNGs upload
  # as an artifact.
  visual:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: pnpm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      # The render harness esbuild-bundles component source, which imports the
      # workspace packages from their built dists — so build components and its
      # dependency graph (lighter than a full `pnpm build`; no app/relay needed
      # since the harness doesn't use Playwright webServers).
      - name: Build render dependencies
        run: pnpm --filter "@gonogo/components..." build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}

      - name: Visual gate (${{ matrix.browser }})
        run: pnpm --filter @gonogo/components visual-gate --engine ${{ matrix.browser }}

      - name: Upload visual diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs-${{ matrix.browser }}
          path: local_docs/renders/_visual-gate-diffs/
          retention-days: 7

name: Deploy to GitHub Pages

# Channel model: the Pages site carries BOTH channels in one artifact.
#
#   /gonogo/        the latest RELEASE build — downloaded from the newest
#                   GitHub Release's site asset (uploaded by release.yml).
#                   End users and the README only ever see this.
#   /gonogo/dev/    the dev channel — rebuilt fresh from main on every
#                   CI-green push, version-suffixed `-dev.<shortsha>` so
#                   stations and the hello handshake identify it.
#
# Until the first GitHub Release exists, the dev build is served at the
# root too, which matches the pre-channel behaviour.
#
# release.yml dispatches this workflow right after uploading a new site
# asset, so a release re-composes the root without waiting for the next
# push to main.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  # @jonpepler/kerbcam comes from GitHub Packages; pnpm install needs
  # read:packages even though the package is public.
  packages: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - id: sha
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "short=${SHA:0:7}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: pnpm install
        env:
          # .npmrc references ${GITHUB_TOKEN} for the @jonpepler scope.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Confirm Axiom token presence
        env:
          VITE_AXIOM_TOKEN: ${{ secrets.VITE_AXIOM_TOKEN }}
        # Length only — never the value. GitHub masks the secret in logs
        # but the workflow run UI doesn't tell you whether a referenced
        # secret actually had a value, so this gives us an explicit
        # success/skip signal per deploy.
        run: |
          if [ -n "$VITE_AXIOM_TOKEN" ]; then
            echo "Axiom token present (len=${#VITE_AXIOM_TOKEN}) — remote logging enabled."
          else
            echo "Axiom token MISSING — remote logging disabled for this deploy."
          fi

      - name: Build dev-channel app
        run: pnpm turbo build --filter=@gonogo/app...
        env:
          VITE_BASE_PATH: /gonogo/dev/
          GONOGO_VERSION_SUFFIX: -dev.${{ steps.sha.outputs.short }}
          # Axiom ingest. If the secret isn't set the logger silently
          # skips installing the Axiom transport, so dropping the secret
          # is a clean way to disable remote logging.
          VITE_AXIOM_TOKEN: ${{ secrets.VITE_AXIOM_TOKEN }}

      - name: Fetch latest release site
        id: prod
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p prod-site
          if gh release download --repo "${{ github.repository }}" \
               --pattern gonogo-site.tar.gz --dir . 2>/dev/null; then
            tar -xzf gonogo-site.tar.gz -C prod-site
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Root will serve the latest release site asset."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No release site asset yet — dev build will serve the root too."
          fi

      - name: Compose site (release at /, dev at /dev/)
        run: |
          mkdir -p site site/dev
          cp -R packages/app/dist/. site/dev/
          if [ "${{ steps.prod.outputs.found }}" = "true" ]; then
            cp -R prod-site/. site/
          else
            # Bootstrap: no release exists yet, so the dev channel serves
            # the root as well. The /dev/ copy above was built with base
            # /gonogo/dev/; the root needs its own base.
            VITE_BASE_PATH=/gonogo/ \
            GONOGO_VERSION_SUFFIX="-dev.${{ steps.sha.outputs.short }}" \
            VITE_AXIOM_TOKEN="${{ secrets.VITE_AXIOM_TOKEN }}" \
              pnpm --filter @gonogo/app build
            cp -R packages/app/dist/. site/
          fi
          # Pages only serves the ROOT 404.html as the SPA fallback, and
          # after composition that's the release build — a deep link to
          # /gonogo/dev/station would boot the wrong app. Materialise the
          # dev SPA's routes as real files instead.
          mkdir -p site/dev/station
          cp site/dev/index.html site/dev/station/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

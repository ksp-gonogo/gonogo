name: Publish npm packages

# Publishes a single `@ksp-gonogo/*` package to public npm via OIDC trusted
# publishing — no NPM_TOKEN, nothing to rotate, and every publish carries a
# provenance attestation. See local_docs/oidc-publishing-guide.md.
#
# WHY workflow_dispatch, and not a tag or a version-bump watcher
#
#   ui-kit versions on its own SemVer line, deliberately: prepare-release.yml
#   bumps packages/app/package.json only, and that number is the app's, not the
#   kit's. So the v* tag namespace can't carry a kit release, and coupling the
#   two back together is the thing the design ruled out.
#
#   That leaves a dedicated trigger. Publishing to a public registry is
#   irreversible (npm forbids reusing a version, and unpublish is a 72-hour
#   window), so it gets the same treatment as every other public-facing action
#   here — the human asks for it, per package, per release. A push-triggered
#   auto-publish would take that decision away.
#
# WHERE THE VERSION COMES FROM
#
#   The package's own package.json at the dispatched ref — not a workflow
#   input. One source of truth: the version a workspace consumer sees is the
#   version that ships, and provenance points at a commit that actually
#   contains it. Releasing is therefore: bump the version, commit, dispatch.
#
# REPUBLISHING THE SAME VERSION
#
#   npm hard-errors on republishing an existing version. The job checks the
#   registry first and exits green with a notice if the version is already up,
#   so a re-dispatch is a no-op rather than a red run.
#
# THEME MUST NEVER PUBLISH
#
#   @ksp-gonogo/theme is `private: true` and is bundled into ui-kit's dist by
#   tsup on purpose. It is blocked three ways: it isn't in the `package` choice
#   below, it has no entry in the directory map, and verify-package-artifact.mjs
#   rejects any `private: true` manifest outright.
#
# SETUP THIS WORKFLOW DEPENDS ON (npmjs.com, already done)
#
#   Each package's Trusted Publisher must name THIS file. If publish-packages.yml
#   is ever renamed, update npmjs.com → package → Settings → Trusted Publisher
#   for BOTH packages or the publish 401s.

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish (version comes from its package.json)
        required: true
        type: choice
        options:
          - ui-kit
          - sitrep-sdk
      dry_run:
        description: Build, pack and verify, but do not publish
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  # Mints the OIDC token npm exchanges for publish rights. Without this the
  # publish 401s — it is the whole mechanism.
  id-token: write
  # pnpm install pulls @jonpepler/kerbcast from GitHub Packages.
  packages: read

concurrency:
  group: publish-packages-${{ inputs.package }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve package directory
        id: pkg
        run: |
          case "${{ inputs.package }}" in
            ui-kit)     DIR=packages/ui-kit ;;
            sitrep-sdk) DIR=mod/sitrep-sdk ;;
            *)
              echo "::error::unknown package '${{ inputs.package }}'"
              exit 1
              ;;
          esac
          NAME="$(node -p "require('./$DIR/package.json').name")"
          VERSION="$(node -p "require('./$DIR/package.json').version")"
          {
            echo "dir=$DIR"
            echo "name=$NAME"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"
          echo "Publishing $NAME@$VERSION from $DIR"

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: pnpm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      # `pnpm pack`/`npm pack` do NOT run the build, and ui-kit's dist is
      # produced by tsup plus a copy of the theme's tokens.css. Packing without
      # this step ships a stale or empty dist and the break only surfaces for
      # whoever installs it. turbo builds the package's dependencies first, so
      # the theme's dist exists before ui-kit's build copies out of it.
      - name: Build
        run: pnpm exec turbo build --filter='${{ steps.pkg.outputs.name }}'

      - name: Is this version already on npm?
        id: published
        run: |
          NAME='${{ steps.pkg.outputs.name }}'
          VERSION='${{ steps.pkg.outputs.version }}'
          # A non-zero exit here is an E404 (not published) or a registry
          # blip. Both fall through to a publish attempt, and npm refuses to
          # overwrite an existing version anyway — the registry stays the
          # authority, this check only keeps a re-dispatch green.
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "::notice::$NAME@$VERSION is already published — nothing to do. Bump the version to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "$NAME@$VERSION is not on npm yet."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        if: steps.published.outputs.skip == 'false'
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: npm pack --pack-destination "$RUNNER_TEMP"

      # Gate the tarball, then publish that same file — so what was checked is
      # exactly what ships, rather than a re-pack that could differ.
      - name: Verify the packed artifact
        if: steps.published.outputs.skip == 'false'
        run: |
          TARBALL="$(ls "$RUNNER_TEMP"/*.tgz)"
          echo "Verifying $TARBALL"
          node scripts/verify-package-artifact.mjs "$TARBALL"
          echo "tarball=$TARBALL" >> "$GITHUB_ENV"

      # Deliberately after `pnpm install`: `registry-url` writes an .npmrc
      # containing a literal ${NODE_AUTH_TOKEN}, and pnpm fails outright on an
      # env var it can't expand. Publishing is the only step that needs the
      # registry configured, so it is configured only for that step.
      - uses: actions/setup-node@v6
        if: steps.published.outputs.skip == 'false'
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org

      - name: Ensure npm supports OIDC (>= 11.5.1)
        if: steps.published.outputs.skip == 'false'
        run: |
          npm install -g npm@latest
          npm -v

      - name: Publish to npm
        if: steps.published.outputs.skip == 'false' && !inputs.dry_run
        # No NODE_AUTH_TOKEN / NPM_TOKEN: npm detects OIDC from the
        # `id-token: write` permission and exchanges it with the registry.
        run: npm publish "$tarball" --access public --provenance

      - name: Publish (dry run)
        if: steps.published.outputs.skip == 'false' && inputs.dry_run
        run: npm publish "$tarball" --access public --provenance --dry-run

      - name: Summary
        run: |
          NAME='${{ steps.pkg.outputs.name }}'
          VERSION='${{ steps.pkg.outputs.version }}'
          if [ '${{ steps.published.outputs.skip }}' = 'true' ]; then
            echo "⏭ $NAME@$VERSION was already on npm — skipped." >> "$GITHUB_STEP_SUMMARY"
          elif [ '${{ inputs.dry_run }}' = 'true' ]; then
            echo "🧪 Dry run: $NAME@$VERSION packed and verified, not published." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "📦 Published $NAME@$VERSION with provenance." >> "$GITHUB_STEP_SUMMARY"
            echo "https://www.npmjs.com/package/$NAME/v/$VERSION" >> "$GITHUB_STEP_SUMMARY"
          fi

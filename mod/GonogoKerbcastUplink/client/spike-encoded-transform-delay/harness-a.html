<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>harness A — encoded transform delay</title>
</head>
<body>
<h1>Encoded transform delay spike</h1>
<canvas id="src" width="320" height="180" style="display:none"></canvas>
<video id="remote" autoplay playsinline muted width="320" height="180"></video>
<canvas id="render" style="display:none"></canvas>
<pre id="log"></pre>
<script>
const DELAY_MS = 4000;
const TOTAL_RUN_MS = 15000;
const HARD_TIMEOUT_MS = 25000;
const BITS = 32;
const COLS = 8;
const ROWS = 4;

const logEl = document.getElementById("log");
function log(...args) {
  const line = args.map((a) => (typeof a === "object" ? JSON.stringify(a) : String(a))).join(" ");
  logEl.textContent += `${line}\n`;
  console.log("[harnessA]", line);
}

window.__harnessAResult = { done: false };
window.__workerStats = null;

function finish(result) {
  if (window.__harnessAResult.done) return;
  window.__harnessAResult = { ...result, done: true };
  log("DONE", JSON.stringify(window.__harnessAResult));
}

// Hard timeout so a stuck engine still produces a result instead of hanging
// the Playwright driver forever.
setTimeout(() => {
  if (!window.__harnessAResult.done) {
    finish({
      timedOut: true,
      partial: window.__harnessAResult,
      workerStats: window.__workerStats,
    });
  }
}, HARD_TIMEOUT_MS);

function probeCapabilities() {
  return {
    RTCRtpScriptTransform: typeof RTCRtpScriptTransform !== "undefined",
    receiverCreateEncodedStreams:
      typeof RTCRtpReceiver !== "undefined" &&
      typeof RTCRtpReceiver.prototype.createEncodedStreams === "function",
    MediaStreamTrackProcessor: typeof MediaStreamTrackProcessor !== "undefined",
    requestVideoFrameCallback:
      typeof HTMLVideoElement !== "undefined" &&
      typeof HTMLVideoElement.prototype.requestVideoFrameCallback === "function",
  };
}

function drawSourceFrame(ctx, elapsedMs) {
  ctx.fillStyle = "#000000";
  ctx.fillRect(0, 0, 320, 180);
  const blockW = 320 / COLS;
  const blockH = 180 / ROWS;
  for (let i = 0; i < BITS; i++) {
    const bit = (elapsedMs >>> (BITS - 1 - i)) & 1;
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    ctx.fillStyle = bit ? "#ffffff" : "#000000";
    ctx.fillRect(col * blockW, row * blockH, blockW, blockH);
  }
  // Sentinel marker so we can visually confirm a real frame is present.
  ctx.fillStyle = "#ff00ff";
  ctx.fillRect(0, 0, 6, 6);
}

function decodeRenderedFrame(ctx, width, height) {
  const blockW = width / COLS;
  const blockH = height / ROWS;
  let value = 0;
  for (let i = 0; i < BITS; i++) {
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    const cx = Math.floor(col * blockW + blockW / 2);
    const cy = Math.floor(row * blockH + blockH / 2);
    const [r, g, b] = ctx.getImageData(cx, cy, 1, 1).data;
    const luma = 0.299 * r + 0.587 * g + 0.114 * b;
    const bit = luma > 128 ? 1 : 0;
    value = (value * 2 + bit) >>> 0;
  }
  return value;
}

async function run() {
  const caps = probeCapabilities();
  log("capabilities", caps);

  if (!caps.RTCRtpScriptTransform && !caps.receiverCreateEncodedStreams) {
    finish({
      capabilities: caps,
      capabilityUsed: "none",
      error: "No encoded-transform API available on this engine (neither RTCRtpScriptTransform nor RTCRtpReceiver.createEncodedStreams).",
    });
    return;
  }

  const worker = new Worker("./worker-a.js");
  const workerReady = new Promise((resolve) => {
    worker.addEventListener("message", function onReady(e) {
      if (e.data?.kind === "worker-ready") {
        worker.removeEventListener("message", onReady);
        resolve();
      }
    });
  });
  worker.addEventListener("message", (e) => {
    if (e.data?.kind === "stats") {
      window.__workerStats = e.data;
    } else if (e.data?.kind === "error") {
      log("worker error", e.data);
    } else if (e.data?.kind === "onrtctransform-fired") {
      log("onrtctransform fired on worker side");
    } else if (e.data?.kind === "frame-shape") {
      window.__frameShape = e.data;
      log("frame shape", e.data);
    }
  });
  worker.addEventListener("error", (e) => {
    log("worker.onerror", e.message, e.filename, e.lineno);
  });
  await workerReady;

  const usingScriptTransform = caps.RTCRtpScriptTransform;
  const capabilityUsed = usingScriptTransform ? "script-transform" : "legacy-insertable-streams";
  log("using", capabilityUsed);

  const pc1 = new RTCPeerConnection();
  const pc2 = new RTCPeerConnection(
    usingScriptTransform ? {} : { encodedInsertableStreams: true },
  );

  pc1.onicecandidate = (e) => {
    if (e.candidate) pc2.addIceCandidate(e.candidate).catch(() => {});
  };
  pc2.onicecandidate = (e) => {
    if (e.candidate) pc1.addIceCandidate(e.candidate).catch(() => {});
  };

  const remoteVideo = document.getElementById("remote");
  const renderCanvas = document.getElementById("render");
  const renderCtx = renderCanvas.getContext("2d", { willReadFrequently: true });

  let transformAttached = false;
  let transformAttachError = null;

  pc2.ontrack = (event) => {
    log("pc2 ontrack fired");
    remoteVideo.srcObject = event.streams[0];
    const receiver = event.receiver;
    try {
      if (usingScriptTransform) {
        receiver.transform = new RTCRtpScriptTransform(worker, { delayMs: DELAY_MS });
        transformAttached = true;
      } else if (typeof receiver.createEncodedStreams === "function") {
        const streams = receiver.createEncodedStreams();
        worker.postMessage(
          { kind: "attach-legacy", readable: streams.readable, writable: streams.writable, options: { delayMs: DELAY_MS } },
          [streams.readable, streams.writable],
        );
        transformAttached = true;
      } else {
        transformAttachError = "no attach mechanism found at ontrack time";
      }
    } catch (err) {
      transformAttachError = String(err);
      log("transform attach threw", transformAttachError);
    }
  };

  // --- source side: canvas -> captureStream -> pc1 ---
  const srcCanvas = document.getElementById("src");
  const srcCtx = srcCanvas.getContext("2d");
  const t0 = Date.now();
  drawSourceFrame(srcCtx, 0);
  const srcStream = srcCanvas.captureStream(10);
  const srcTrack = srcStream.getVideoTracks()[0];
  pc1.addTrack(srcTrack, srcStream);

  const drawTimer = setInterval(() => {
    drawSourceFrame(srcCtx, Date.now() - t0);
  }, 50);

  // --- manual SDP loopback ---
  const offer = await pc1.createOffer();
  await pc1.setLocalDescription(offer);
  await pc2.setRemoteDescription(offer);
  const answer = await pc2.createAnswer();
  await pc2.setLocalDescription(answer);
  await pc1.setRemoteDescription(answer);

  await new Promise((resolve) => {
    if (pc2.connectionState === "connected") return resolve();
    pc2.addEventListener("connectionstatechange", () => {
      if (pc2.connectionState === "connected") resolve();
    });
    // Some engines never flip to "connected" cleanly for a loopback pc
    // pair on connectionState; iceConnectionState is the more reliable
    // signal on those. Race both.
    pc2.addEventListener("iceconnectionstatechange", () => {
      if (pc2.iceConnectionState === "connected" || pc2.iceConnectionState === "completed") {
        resolve();
      }
    });
  });
  log("pc2 connected, iceConnectionState=", pc2.iceConnectionState);

  await new Promise((resolve) => {
    if (remoteVideo.readyState >= 2) return resolve();
    remoteVideo.addEventListener("loadeddata", () => resolve(), { once: true });
  });
  log("remote video has data", remoteVideo.videoWidth, remoteVideo.videoHeight);

  renderCanvas.width = remoteVideo.videoWidth || 320;
  renderCanvas.height = remoteVideo.videoHeight || 180;

  const samples = [];
  let rvfcHandle = null;

  function sampleOnce() {
    try {
      renderCtx.drawImage(remoteVideo, 0, 0, renderCanvas.width, renderCanvas.height);
      const decodedElapsed = decodeRenderedFrame(renderCtx, renderCanvas.width, renderCanvas.height);
      const nowElapsed = Date.now() - t0;
      samples.push({ nowElapsed, decodedElapsed, observedDelayMs: nowElapsed - decodedElapsed });
    } catch (err) {
      log("sample error", String(err));
    }
  }

  if (caps.requestVideoFrameCallback) {
    const loop = () => {
      remoteVideo.requestVideoFrameCallback(() => {
        sampleOnce();
        if (Date.now() - t0 < TOTAL_RUN_MS) loop();
      });
    };
    loop();
  } else {
    rvfcHandle = setInterval(() => {
      sampleOnce();
      if (Date.now() - t0 >= TOTAL_RUN_MS) clearInterval(rvfcHandle);
    }, 33);
  }

  await new Promise((resolve) => setTimeout(resolve, TOTAL_RUN_MS + 500));
  if (rvfcHandle) clearInterval(rvfcHandle);
  clearInterval(drawTimer);

  worker.postMessage({ kind: "get-stats" });
  await new Promise((resolve) => setTimeout(resolve, 200));

  // Steady-state window: after the delay has had time to ramp up plus a
  // margin, and before the very end (avoid edge effects from the run
  // stopping).
  const steady = samples.filter((s) => s.nowElapsed > DELAY_MS + 1000 && s.nowElapsed < TOTAL_RUN_MS - 500);
  const delays = steady.map((s) => s.observedDelayMs);
  const mean = delays.length ? delays.reduce((a, b) => a + b, 0) / delays.length : null;
  const variance = delays.length ? delays.reduce((a, b) => a + (b - mean) ** 2, 0) / delays.length : null;
  const stdDev = variance !== null ? Math.sqrt(variance) : null;

  let statsSnapshot = null;
  try {
    const report = await pc2.getStats();
    report.forEach((r) => {
      if (r.type === "inbound-rtp" && r.kind === "video") {
        statsSnapshot = {
          framesDecoded: r.framesDecoded,
          framesReceived: r.framesReceived,
          freezeCount: r.freezeCount,
          pauseCount: r.pauseCount,
          keyFramesDecoded: r.keyFramesDecoded,
          packetsLost: r.packetsLost,
          jitterBufferDelay: r.jitterBufferDelay,
          jitterBufferEmittedCount: r.jitterBufferEmittedCount,
        };
      }
    });
  } catch (err) {
    log("getStats error", String(err));
  }

  finish({
    capabilities: caps,
    capabilityUsed,
    transformAttached,
    transformAttachError,
    sampleCount: samples.length,
    steadySampleCount: steady.length,
    meanDelayMs: mean,
    stdDevDelayMs: stdDev,
    minDelayMs: delays.length ? Math.min(...delays) : null,
    maxDelayMs: delays.length ? Math.max(...delays) : null,
    firstFewSamples: samples.slice(0, 8),
    lastFewSamples: samples.slice(-8),
    statsSnapshot,
    workerStats: window.__workerStats,
    frameShape: window.__frameShape,
  });
}

run().catch((err) => {
  log("run() threw", String(err), err.stack);
  finish({ error: String(err), stack: err.stack });
});
</script>
</body>
</html>
